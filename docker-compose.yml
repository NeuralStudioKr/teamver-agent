version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ta-postgres
    environment:
      POSTGRES_DB: teamver_agent
      POSTGRES_USER: teamver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ta_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5434:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teamver -d teamver_agent']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ta-backend
    ports:
      - '3101:3001'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads_data:/tmp/uploads
      - drive_data:/tmp/drive
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://teamver:${POSTGRES_PASSWORD:-ta_dev_password}@postgres:5432/teamver_agent
      # --- 고객사 식별 (DB seed가 사용) ---
      - WORKSPACE_NAME=${WORKSPACE_NAME:-workspace}
      - WORKSPACE_SLUG=${WORKSPACE_SLUG:-default}
      - BOT_PASSWORD=${BOT_PASSWORD:?BOT_PASSWORD must be set in .env}
      # --- 3 AI 직원 정체성 (DB seed에서 upsert) ---
      - AI_COORDINATOR_NAME=${AI_COORDINATOR_NAME:-조율자}
      - AI_COORDINATOR_EMAIL=${AI_COORDINATOR_EMAIL:-coordinator@example.local}
      - AI_COORDINATOR_TITLE=${AI_COORDINATOR_TITLE:-조율자}
      - AI_WRITER_NAME=${AI_WRITER_NAME:-작성자}
      - AI_WRITER_EMAIL=${AI_WRITER_EMAIL:-writer@example.local}
      - AI_WRITER_TITLE=${AI_WRITER_TITLE:-작성자}
      - AI_REVIEWER_NAME=${AI_REVIEWER_NAME:-검토자}
      - AI_REVIEWER_EMAIL=${AI_REVIEWER_EMAIL:-reviewer@example.local}
      - AI_REVIEWER_TITLE=${AI_REVIEWER_TITLE:-검토자}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3101}
    container_name: ta-frontend
    ports:
      - '3100:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3101}
    restart: unless-stopped

volumes:
  postgres_data:
    name: ta-postgres-data
  uploads_data:
    name: ta-uploads-data
  drive_data:
    name: ta-drive-data

networks:
  default:
    name: ta-network
